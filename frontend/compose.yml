name: finance-app
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: '${VITE_API_URL:-http://localhost}'
      VITE_API_PORT: '${VITE_API_PORT:-80}'
      VITE_APP_NAME: '${VITE_APP_NAME:-Finance App}'
      VITE_ENV: '${VITE_ENV:-development}'
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - sail

volumes:
  frontend_node_modules:

networks:
  sail:
    external: true
    name: finance-app_sail
