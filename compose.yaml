services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                APP_ENV: '${APP_ENV:-local}'
        ports:
            - '${APP_PORT:-80}:80'
            - '${APP_HTTPS_PORT:-443}:443'
            - '${APP_HTTPS_PORT:-443}:443/udp'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
            - '${XDEBUG_PORT:-9003}:9003'
        environment:
            APP_ENV: '${APP_ENV:-local}'
            APP_DEBUG: '${APP_DEBUG:-true}'
        volumes:
            - '.:/app'
            - caddy_data:/data
            - caddy_config:/config
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
            - meilisearch
            - mailpit
            - selenium
        tty: true
    pgsql:
        image: 'postgres:17'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-password}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-password}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    meilisearch:
        image: 'getmeili/meilisearch:latest'
        ports:
            - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
        environment:
            MEILI_NO_ANALYTICS: '${MEILISEARCH_NO_ANALYTICS:-false}'
        volumes:
            - 'sail-meilisearch:/meili_data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - wget
                - '--no-verbose'
                - '--spider'
                - 'http://127.0.0.1:7700/health'
            retries: 3
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
    selenium:
        image: selenium/standalone-chromium
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - '/dev/shm:/dev/shm'
        networks:
            - sail
    localstack:
        image: 'localstack/localstack:latest'
        ports:
            - '${FORWARD_LOCALSTACK_PORT:-4566}:4566'
        environment:
            SERVICES: '${LOCALSTACK_SERVICES:-s3,sqs,ses,sns,ec2}'
            DEBUG: '${LOCALSTACK_DEBUG:-0}'
            PERSISTENCE: '1'
            AWS_DEFAULT_REGION: '${AWS_DEFAULT_REGION:-us-east-1}'
            LOCALSTACK_AUTH_TOKEN: '${LOCALSTACK_AUTH_TOKEN:-localstack}'
            APP_NAME: '${APP_NAME:-finance-app}'
            SES_FROM_EMAIL: '${MAIL_FROM_ADDRESS:-noreply@finance-app.local}'
        volumes:
            - 'sail-localstack:/var/lib/localstack'
            - '/var/run/docker.sock:/var/run/docker.sock'
            - './docker/infra/scripts/localstack-seed.sh:/etc/localstack/init/ready.d/localstack-seed.sh'
            # - './docker/localstack/init.sh:/etc/localstack/init/ready.d/init.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - bash
                - '-c'
                - 'awslocal s3 ls'
            retries: 3
            timeout: 5s
networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    sail-meilisearch:
        driver: local
    caddy_data:
        driver: local
    caddy_config:
        driver: local
    sail-localstack:
        driver: local
